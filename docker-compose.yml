services:
  erp-web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_DEPLOYMENT_LABEL: ${NEXT_PUBLIC_DEPLOYMENT_LABEL:-}
    container_name: erp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /volume1/ERP_PHOTOS:/data/work-photos
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      WORK_PHOTOS_DIR: /data/work-photos
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_DEPLOYMENT_LABEL: ${NEXT_PUBLIC_DEPLOYMENT_LABEL:-}

  erp-db:
    image: postgres
    container_name: erp-postgres
    restart: unless-stopped
    volumes:
      - erp-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "erp_system"
      POSTGRES_USER: "erp_admin"
      POSTGRES_PASSWORD: "KorCarvia_NAS_DB_2026"
      PGDATA: "/var/lib/postgresql/data/pgdata"

  erp-db-admin:
    image: adminer
    container_name: erp-adminer
    restart: unless-stopped
    depends_on:
      - erp-db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: erp-db

volumes:
  erp-postgres-data:
